<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications — TechSpecialist HR</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d1f3c;
      --primary-light: #1a3a6e;
      --accent: #4584ed;
      --accent-hover: #2d65c4;
      --text: #2f2f2f;
      --text-muted: #5f6368;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: var(--primary);
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 32px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 24px;
    }

    .sidebar-logo img { height: 36px; width: auto; }
    .sidebar-logo span { font-size: 18px; font-weight: 700; color: #fff; }

    .sidebar-nav { flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      border-radius: 8px;
      margin-bottom: 4px;
      transition: all 0.2s;
    }

    .nav-item:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }
    .nav-item.active { background: var(--accent); color: #fff; }
    .nav-item svg { width: 20px; height: 20px; }

    .sidebar-footer {
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .user-avatar {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }

    .user-details { flex: 1; min-width: 0; }
    .user-name { color: #fff; font-size: 14px; font-weight: 600; }
    .user-email { color: rgba(255, 255, 255, 0.5); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .logout-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

    .main {
      margin-left: 260px;
      padding: 32px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title { font-size: 28px; font-weight: 700; color: var(--text); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-filter {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-filter:hover { border-color: var(--accent); color: var(--accent); }
    .btn-filter.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .application-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .application-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .application-header:hover { background: var(--bg); }

    .application-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .application-avatar {
      width: 48px;
      height: 48px;
      background: var(--bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 18px;
    }

    .application-details { flex: 1; }

    .application-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .application-meta {
      font-size: 14px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
    }

    .application-status {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-badge {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
    }

    .status-new { background: #fef3c7; color: #b45309; }
    .status-reviewing { background: #eff6ff; color: #1d4ed8; }
    .status-shortlisted { background: #ecfdf5; color: #047857; }
    .status-rejected { background: #fef2f2; color: #dc2626; }

    .expand-icon {
      color: var(--text-muted);
      transition: transform 0.2s;
    }

    .application-card.expanded .expand-icon { transform: rotate(180deg); }

    .application-body {
      display: none;
      padding: 24px;
    }

    .application-card.expanded .application-body { display: block; }

    .detail-section { margin-bottom: 24px; }
    .detail-section:last-child { margin-bottom: 0; }

    .detail-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .detail-content {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
    }

    .detail-link {
      color: var(--accent);
      text-decoration: none;
      word-break: break-all;
    }

    .detail-link:hover { text-decoration: underline; }

    .application-actions {
      display: flex;
      gap: 12px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: var(--accent-hover); }

.btn-success {
      background: var(--success);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: #b91c1c;
    }

    /* Premium Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      transform: scale(0.9);
      transition: transform 0.3s;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal-icon.warning { background: #fef3c7; color: #d97706; }
    .modal-icon.success { background: #d1fae5; color: #059669; }
    .modal-icon.error { background: #fee2e2; color: #dc2626; }
    .modal-icon.info { background: #dbeafe; color: #2563eb; }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .modal-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .modal-body {
      font-size: 15px;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-btn {
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      font-family: inherit;
    }

    .modal-btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .modal-btn-primary:hover {
      background: var(--accent-hover);
    }

    .modal-btn-secondary {
      background: #f3f4f6;
      color: var(--text);
    }

    .modal-btn-secondary:hover {
      background: #e5e7eb;
    }

    .modal-btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .modal-btn-danger:hover {
      background: #b91c1c;
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .empty-state {
      padding: 64px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 64px;
      height: 64px;
      background: var(--bg);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--text-muted);
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--text-muted);
    }

    .job-filter {
      background: #fff;
      border: 1px solid var(--border);
    }

    @media (max-width: 1024px) {
      .sidebar { width: 80px; }
      .sidebar-logo span, .nav-item span, .user-details, .logout-btn span { display: none; }
      .nav-item, .logout-btn { justify-content: center; padding: 12px; }
      .main { margin-left: 80px; }
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; padding: 20px; }
      .page-header { flex-direction: column; gap: 16px; align-items: flex-start; }
      .application-meta { flex-direction: column; gap: 4px; }
      .application-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .application-status { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="https://res.cloudinary.com/daqmbfctv/image/upload/v1772108889/WhatsApp_Image_2026-02-26_at_12.00.40-removebg-preview_qp8kjd.png" alt="TechSpecialist">
      
    </div>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/>
          <rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a href="/admin/jobs" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
          <rect x="8" y="2" width="8" height="4" rx="1"/>
        </svg>
        <span>Jobs</span>
      </a>
      <a href="/admin/applications" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Applications</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div class="user-details">
          <div class="user-name" id="user-name">Admin</div>
          <div class="user-email" id="user-email">admin@techspecialist.com</div>
        </div>
      </div>
      <button class="logout-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1 class="page-title">Applications</h1>
      <button class="btn btn-danger" id="clearAllBtn" onclick="clearAllApplications()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        Clear All
      </button>
    </div>

    <div class="filters" id="filters">
      <button class="btn btn-filter active" data-status="all">All</button>
      <button class="btn btn-filter" data-status="new">New</button>
      <button class="btn btn-filter" data-status="reviewing">Reviewing</button>
      <button class="btn btn-filter" data-status="shortlisted">Shortlisted</button>
      <button class="btn btn-filter" data-status="rejected">Rejected</button>
    </div>

    <div id="applications-list">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <h3 class="empty-title">No applications yet</h3>
        <p class="empty-desc">Applications will appear here when candidates apply.</p>
      </div>
    </div>
    
    <!-- Premium Modal -->
    <div class="modal-overlay" id="premiumModal">
      <div class="modal-container">
        <div class="modal-icon" id="modalIcon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="modalIconSvg">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </div>
        <h3 class="modal-title" id="modalTitle">Confirm</h3>
        <p class="modal-subtitle" id="modalSubtitle"></p>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1151-t0RDGn1bz0GwMr4Uv0uA4E6bnoo",
      authDomain: "techspecialist-careers.firebaseapp.com",
      projectId: "techspecialist-careers",
      storageBucket: "techspecialist-careers.firebasestorage.app",
      messagingSenderId: "68286942864",
      appId: "1:68286942864:web:06748d637d7422f0ccd215"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function closeModal() {
      document.getElementById('premiumModal').classList.remove('active');
      document.body.style.overflow = '';
    }

    function showModal(options) {
      const modal = document.getElementById('premiumModal');
      const icon = document.getElementById('modalIcon');
      const iconSvg = document.getElementById('modalIconSvg');
      const title = document.getElementById('modalTitle');
      const subtitle = document.getElementById('modalSubtitle');
      const body = document.getElementById('modalBody');
      const actions = document.getElementById('modalActions');

      icon.className = 'modal-icon ' + (options.iconType || 'info');

      const icons = {
        warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
        success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
        error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
        info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
      };

      iconSvg.outerHTML = icons[options.iconType] || icons.info;
      title.textContent = options.title || 'Notice';
      subtitle.textContent = options.subtitle || '';
      body.innerHTML = options.body || '';

      if (options.buttons && options.buttons.length > 0) {
        actions.innerHTML = '';
        options.buttons.forEach(btn => {
          const button = document.createElement('button');
          button.className = 'modal-btn ' + btn.className;
          button.innerHTML = btn.text;
          button.onclick = () => { if (btn.onClose !== false) closeModal(); btn.onClick && btn.onClick(); };
          actions.appendChild(button);
        });
      } else {
        actions.innerHTML = '';
      }

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    document.getElementById('premiumModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });

    let allApplications = [];
    let currentFilter = 'all';

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = '/admin/login';
        return;
      }
      document.getElementById('user-name').textContent = user.displayName || 'Admin';
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('user-avatar').textContent = (user.displayName || 'A')[0].toUpperCase();
      loadApplications();
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = '/admin/login';
    });

    document.querySelectorAll('.btn-filter').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        renderApplications();
      });
    });

    async function loadApplications() {
      const q = query(collection(db, 'applications'), orderBy('appliedAt', 'desc'));
      const snapshot = await getDocs(q);
      allApplications = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderApplications();
    }

    window.clearAllApplications = async function() {
      if (allApplications.length === 0) {
        showModal({
          title: 'No Applications',
          subtitle: '',
          body: '<p>There are no applications to delete.</p>',
          iconType: 'info',
          buttons: [{ text: 'OK', className: 'modal-btn-primary' }]
        });
        return;
      }

      showModal({
        title: 'Clear All Applications',
        subtitle: `${allApplications.length} application(s) found`,
        body: '<p>Are you sure you want to delete all applications? This action cannot be undone.</p>',
        iconType: 'warning',
        buttons: [
          { text: 'Cancel', className: 'modal-btn-secondary' },
          { text: 'Delete All', className: 'modal-btn-danger', onClick: async () => {
            const btn = document.getElementById('clearAllBtn');
            btn.disabled = true;
            btn.innerHTML = 'Deleting...';
            
            try {
              for (const app of allApplications) {
                await deleteDoc(doc(db, 'applications', app.id));
              }
              allApplications = [];
              renderApplications();
              showModal({
                title: 'Deleted!',
                subtitle: '',
                body: '<p>All applications have been deleted.</p>',
                iconType: 'success',
                buttons: [{ text: 'OK', className: 'modal-btn-primary' }]
              });
            } catch (error) {
              console.error('Error deleting applications:', error);
              showModal({
                title: 'Error',
                subtitle: '',
                body: '<p>Failed to delete: ' + error.message + '</p>',
                iconType: 'error',
                buttons: [{ text: 'OK', className: 'modal-btn-primary' }]
              });
            } finally {
              btn.disabled = false;
              btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Clear All';
            }
          }}
        ]
      });
    };

    function renderApplications() {
      const list = document.getElementById('applications-list');
      const filtered = currentFilter === 'all'
        ? allApplications
        : allApplications.filter(a => (a.status || 'new') === currentFilter);

      if (filtered.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
              </svg>
            </div>
            <h3 class="empty-title">No applications found</h3>
            <p class="empty-desc">No applications match the selected filter.</p>
          </div>
        `;
        return;
      }

      list.innerHTML = filtered.map(app => {
        const status = app.status || 'new';
        const statusClass = `status-${status}`;
        const date = app.appliedAt?.toDate ? app.appliedAt.toDate().toLocaleDateString() : 'Recently';
        const initial = (app.applicantName || 'A')[0].toUpperCase();

        return `
          <div class="application-card" data-id="${app.id}">
            <div class="application-header" onclick="toggleApplication('${app.id}')">
              <div class="application-info">
                <div class="application-avatar">${initial}</div>
                <div class="application-details">
                  <div class="application-name">${app.applicantName || 'Anonymous'}</div>
                  <div class="application-meta">
                    <span>${app.jobTitle || 'Unknown Position'}</span>
                    <span>${date}</span>
                  </div>
                </div>
              </div>
              <div class="application-status">
                <span class="status-badge ${statusClass}">${status.charAt(0).toUpperCase() + status.slice(1)}</span>
                <span class="expand-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <polyline points="6 9 12 15 18 9"/>
                  </svg>
                </span>
              </div>
            </div>
            <div class="application-body">
              <div class="detail-section">
                <div class="detail-title">Contact Information</div>
                <div class="detail-content">
                  <p><strong>Email:</strong> ${app.applicantEmail || 'N/A'}</p>
                  <p><strong>Phone:</strong> ${app.phone || 'N/A'}</p>
                </div>
              </div>
              <div class="detail-section">
                <div class="detail-title">Resume</div>
                <div class="detail-content">
                  ${app.resumeUrl 
                    ? `<a href="${app.resumeUrl}" target="_blank" class="detail-link">${app.resumeUrl}</a>` 
                    : '<p>No resume link provided</p>'}
                </div>
              </div>
              <div class="detail-section">
                <div class="detail-title">Cover Letter</div>
                <div class="detail-content">${app.coverLetter || 'No cover letter provided'}</div>
              </div>
              <div class="application-actions">
                <button class="btn btn-success" onclick="updateStatus('${app.id}', 'shortlisted')">Shortlist</button>
                <button class="btn btn-filter" onclick="updateStatus('${app.id}', 'reviewing')">Mark Reviewing</button>
                <button class="btn btn-danger" onclick="updateStatus('${app.id}', 'rejected')">Reject</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    window.toggleApplication = function(id) {
      const card = document.querySelector(`.application-card[data-id="${id}"]`);
      card.classList.toggle('expanded');
    };

    window.updateStatus = async function(id, status) {
      await updateDoc(doc(db, 'applications', id), { status, updatedAt: new Date() });
      loadApplications();
    };
  </script>
</body>
</html>
