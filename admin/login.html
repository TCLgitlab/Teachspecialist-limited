<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TechSpecialist Careers</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0d1f3c;
      --primary-light: #1a3a6e;
      --accent: #4584ed;
      --accent-hover: #2d65c4;
      --text: #2f2f2f;
      --text-muted: #5f6368;
      --border: #e5e7eb;
      --error: #dc2626;
      --success: #059669;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .login-logo img {
      height: 40px;
      width: auto;
    }

    .login-logo span {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }

    .login-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(69, 132, 237, 0.1);
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-light);
    }

    .btn-primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .alert {
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background: #fef2f2;
      color: var(--error);
      border: 1px solid #fecaca;
    }

    .alert-success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }

    .alert.show {
      display: block;
    }

    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
    }

    .back-link:hover {
      color: var(--accent);
    }
  </style>
  <!-- Premium Modal -->
  <style>
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      padding: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
      text-align: center;
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .modal-icon.error {
      background: linear-gradient(135deg, #fee2e2, #fecaca);
      color: #dc2626;
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .modal-message {
      font-size: 15px;
      color: #6b7280;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .modal-btn {
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      border: none;
      width: 100%;
    }

    .modal-btn-primary {
      background: #dc2626;
      color: #fff;
    }

    .modal-btn-secondary {
      background: #f3f4f6;
      color: #374151;
    }

    @media (max-width: 480px) {
      .modal { padding: 24px; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <img src="https://res.cloudinary.com/daqmbfctv/image/upload/v1772108889/WhatsApp_Image_2026-02-26_at_12.00.40-removebg-preview_qp8kjd.png" alt="TechSpecialist">
        </div>
        <h1 class="login-title">HR Admin Login</h1>
        <p class="login-subtitle">Sign in to manage jobs and applications</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="admin@techspecialist.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span id="btn-text">Sign In</span>
          <span id="btn-loader" class="loading-spinner" style="display: none;"></span>
        </button>
      </form>

      <a href="/" class="back-link">← Back to Website</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD1151-t0RDGn1bz0GwMr4Uv0uA4E6bnoo",
      authDomain: "techspecialist-careers.firebaseapp.com",
      projectId: "techspecialist-careers",
      storageBucket: "techspecialist-careers.firebasestorage.app",
      messagingSenderId: "68286942864",
      appId: "1:68286942864:web:06748d637d7422f0ccd215"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Check if already logged in
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = '/admin';
      }
    });

    const form = document.getElementById('login-form');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnLoader = document.getElementById('btn-loader');

    function showAlert(message, type = 'error') {
      // Use premium modal instead of inline alert
      showModal({ message: message, type: type });
    }

    function hideAlert() {
      // No longer needed - using modal
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      btnText.style.display = loading ? 'none' : 'inline';
      btnLoader.style.display = loading ? 'inline' : 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('Please enter both email and password');
        return;
      }

      setLoading(true);

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = '/admin';
        }, 1000);
      } catch (error) {
        console.error('Login error:', error);
        switch (error.code) {
          case 'auth/invalid-email':
            showAlert('Invalid email address format');
            break;
          case 'auth/user-not-found':
            showAlert('No account found with this email');
            break;
          case 'auth/wrong-password':
            showAlert('Incorrect password');
            break;
          case 'auth/invalid-credential':
            showAlert('Invalid email or password');
            break;
          default:
            showAlert('Login failed: ' + error.message);
        }
      } finally {
        setLoading(false);
      }
    });
  </script>
<!-- Premium Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon" id="modalIcon">
        <svg id="modalSvg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h3 class="modal-title" id="modalTitle">Error</h3>
      <p class="modal-message" id="modalMessage">An error occurred</p>
      <button class="modal-btn modal-btn-primary" onclick="closeModal()">OK</button>
    </div>
  </div>

  <script>
    function showModal(options) {
      const overlay = document.getElementById('modalOverlay');
      const icon = document.getElementById('modalIcon');
      const svg = document.getElementById('modalSvg');
      const title = document.getElementById('modalTitle');
      const message = document.getElementById('modalMessage');
      
      title.textContent = options.title || 'Error';
      message.textContent = options.message || 'An error occurred';
      
      if (options.type === 'error') {
        icon.className = 'modal-icon error';
        svg.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>';
      }
      
      overlay.classList.add('active');
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>
